name: Daily Newsletter

on:
  schedule:
    # 22:30 UTC daily (= 06:30 Singapore time). Adjust as needed.
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUDIENCE: ${{ secrets.AUDIENCE }}
          GMAIL_ADDRESS: ${{ vars.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ vars.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Commit updated seen-articles database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain articles.db)" ]]; then
            git add articles.db
            git commit -m "chore: update seen-articles database"
            git push
          else
            echo "No changes to articles.db; skipping commit."
          fi
